<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/flash-on.png?v=light">
    
    <link rel="apple-touch-icon" sizes="152x152" href="https://img.icons8.com/fluency/152/flash-on.png?v=light">
    <link rel="apple-touch-icon" sizes="180x180" href="https://img.icons8.com/fluency/180/flash-on.png?v=light">
    <link rel="apple-touch-icon" sizes="167x167" href="https://img.icons8.com/fluency/167/flash-on.png?v=light">
    
    <link rel="apple-touch-startup-image" href="https://img.icons8.com/fluency/512/flash-on.png?v=light">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>FitLog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-main: #EDF2FF; --brand-main: #6366F1; --rested: #E2E8F0; --recovering: #FCD34D; --fatigued: #60A5FA; --active: #FB7185; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        input, textarea { -webkit-user-select: auto; user-select: auto; }
        body { background-color: var(--bg-main); min-height: 100vh; font-family: "PingFang SC", sans-serif; color: #1E1B4B; padding-top: env(safe-area-inset-top); margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,1); border-radius: 32px; box-shadow: 0 15px 35px rgba(79, 70, 229, 0.08); }
        .muscle-slice { stroke: #FFF; stroke-width: 1.2; transition: all 0.3s ease; cursor: pointer; }
        .no-click { cursor: default; pointer-events: none; opacity: 0.6; } 
        .heat-rested { fill: var(--rested); }
        .heat-recovering { fill: var(--recovering); }
        .heat-fatigued { fill: var(--fatigued); }
        .is-active { fill: var(--active) !important; stroke: #000; stroke-width: 1.5; filter: drop-shadow(0 0 8px rgba(251, 113, 133, 0.4)); }
        .status-tag { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 900; }
        .status-ready { background: #F1F5F9; color: #64748B; }
        .status-recovering { background: #FEF3C7; color: #92400E; }
        .status-training { background: #DBEAFE; color: #1E40AF; }
        .mode-btn { padding: 12px 24px; border-radius: 16px; font-weight: 900; font-size: 14px; border: 2px solid #EEF2FF; background: #FFF; color: #64748B; }
        .mode-btn.active { background: var(--brand-main); color: white; border-color: var(--brand-main); }
        input[type=range] { -webkit-appearance: none; background: #E0E7FF; height: 8px; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: var(--brand-main); border: 3px solid #FFF; }
        .nav-active { color: var(--brand-main) !important; font-weight: 900; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-cell { aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; background: #FFF; position: relative; }
        .day-today { background: var(--brand-main) !important; color: white !important; }
        .workout-dot { width: 4px; height: 4px; border-radius: 50%; margin: 1px; }
        .record-card { border-left: 8px solid transparent; position: relative; }
        .delete-btn { position: absolute; bottom: 12px; right: 16px; color: #CBD5E1; font-size: 18px; padding: 4px; font-weight: normal; }
        .delete-btn:active { color: #F43F5E; }
        #color-palette div { cursor: pointer; pointer-events: auto !important; }
    </style>
</head>
<body>
    <div id="workout-view" class="flex flex-col min-h-screen px-6 pb-32 text-center">
        <header class="pt-8 pb-2">
            <h1 class="text-4xl font-black tracking-tighter italic text-indigo-950">FITLOG<span class="text-rose-500">.</span></h1>
        </header>

        <main class="flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-4">
            <section class="glass-card p-6 flex flex-col items-center shadow-sm">
                <div class="flex justify-around items-start w-full mb-4">
                    <div class="flex-1 flex flex-col items-center">
                        <span class="text-[10px] font-black text-slate-300 mb-2 uppercase">Front</span>
                        <svg viewBox="0 0 100 160" class="w-32 h-auto overflow-visible">
                            <circle cx="50" cy="15" r="9" class="muscle-slice heat-rested no-click" /> 
                            <circle data-part="肩膀" cx="31" cy="29" r="7" class="muscle-slice heat-rested" />
                            <circle data-part="肩膀" cx="69" cy="29" r="7" class="muscle-slice heat-rested" />
                            <path data-part="胸部" d="M36 32 a14 14 0 0 1 28 0 v4 h-28 z" class="muscle-slice heat-rested" />
                            <g data-part="核心"><rect x="41" y="44" width="8" height="7" rx="2" class="muscle-slice heat-rested" /><rect x="51" y="44" width="8" height="7" rx="2" class="muscle-slice heat-rested" /><rect x="41" y="53" width="8" height="7" rx="2" class="muscle-slice heat-rested" /><rect x="51" y="53" width="8" height="7" rx="2" class="muscle-slice heat-rested" /><rect x="41" y="62" width="8" height="7" rx="2" class="muscle-slice heat-rested" /><rect x="51" y="62" width="8" height="7" rx="2" class="muscle-slice heat-rested" /></g>
                            <rect data-part="大臂" x="18" y="37" width="9" height="18" rx="4.5" class="muscle-slice heat-rested" /><rect data-part="大臂" x="73" y="37" width="9" height="18" rx="4.5" class="muscle-slice heat-rested" />
                            <rect data-part="小臂" x="15" y="58" width="8" height="16" rx="4" class="muscle-slice heat-rested" /><rect data-part="小臂" x="77" y="58" width="8" height="16" rx="4" class="muscle-slice heat-rested" />
                            <rect data-part="大腿" x="38" y="76" width="11" height="26" rx="5.5" class="muscle-slice heat-rested" /><rect data-part="大腿" x="51" y="76" width="11" height="26" rx="5.5" class="muscle-slice heat-rested" />
                            <rect data-part="小腿" x="39" y="105" width="9" height="22" rx="4.5" class="muscle-slice heat-rested" /><rect data-part="小腿" x="52" y="105" width="9" height="22" rx="4.5" class="muscle-slice heat-rested" />
                        </svg>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <span class="text-[10px] font-black text-slate-300 mb-2 uppercase">Back</span>
                        <svg viewBox="0 0 100 160" class="w-32 h-auto overflow-visible">
                            <circle cx="50" cy="15" r="9" class="muscle-slice heat-rested no-click" />
                            <path data-part="背部" d="M28 28 q22 -6 44 0 l-4 16 h-36 z" class="muscle-slice heat-rested" />
                            <g data-part="臀部"><circle cx="43" cy="64" r="11" class="muscle-slice heat-rested" /><circle cx="57" cy="64" r="11" class="muscle-slice heat-rested" /></g>
                            <rect data-part="大腿" x="40" y="78" width="10" height="25" rx="5" class="muscle-slice heat-rested" /><rect data-part="大腿" x="50" y="78" width="10" height="25" rx="5" class="muscle-slice heat-rested" />
                            <rect data-part="小腿" x="41" y="105" width="8" height="22" rx="4" class="muscle-slice heat-rested" /><rect data-part="小腿" x="51" y="105" width="8" height="22" rx="4" class="muscle-slice heat-rested" />
                        </svg>
                    </div>
                </div>

                <div id="recovery-status" class="flex flex-wrap justify-center gap-1.5 min-h-[24px]"></div>

                <div class="flex gap-3 w-full mt-6">
                    <button id="btn-cardio" onclick="toggleSpecial('有氧')" class="mode-btn flex-1 py-3">🏃 有氧</button>
                    <button id="btn-stretch" onclick="toggleSpecial('拉伸')" class="mode-btn flex-1 py-3">🧘 拉伸</button>
                </div>
                <button id="go-btn" class="w-full mt-4 bg-slate-400 text-white py-5 px-4 rounded-3xl font-black text-lg shadow-xl active:scale-95 transition-all leading-tight">
                    请选择部位
                </button>
            </section>

            <section class="glass-card p-6 space-y-6 text-left shadow-sm">
                <div class="flex justify-between items-center">
                    <div><p class="text-[10px] font-black text-slate-400">DURATION</p><h3 class="text-3xl font-black tabular-nums" id="timer-display">00:00:00</h3></div>
                    <div class="flex flex-wrap justify-end gap-1.5" id="color-palette" style="max-width: 120px;">
                        <div class="w-5 h-5 rounded-full bg-indigo-950 ring-2 ring-indigo-400" data-color="#1E1B4B" onclick="selectColor(this)"></div>
                        <div class="w-5 h-5 rounded-full bg-white border ring-1 ring-transparent" data-color="#FFFFFF" onclick="selectColor(this)"></div>
                        <div class="w-5 h-5 rounded-full bg-rose-500 ring-1 ring-transparent" data-color="#F43F5E" onclick="selectColor(this)"></div>
                        <div class="w-5 h-5 rounded-full bg-emerald-500 ring-1 ring-transparent" data-color="#10B981" onclick="selectColor(this)"></div>
                        <div class="w-5 h-5 rounded-full bg-sky-500 ring-1 ring-transparent" data-color="#0EA5E9" onclick="selectColor(this)"></div>
                        <div class="w-5 h-5 rounded-full bg-orange-400 ring-1 ring-transparent" data-color="#FB923C" onclick="selectColor(this)"></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <div class="flex justify-between"><p class="text-[10px] font-black text-indigo-900">WEIGHT</p><span id="weight-val" class="text-xs font-black text-rose-500">0 kg</span></div>
                        <input type="range" id="weight-slider" min="0" max="100" step="2" value="0" class="w-full">
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between"><p class="text-[10px] font-black text-indigo-900">INTENSITY</p><span id="intensity-val" class="text-xs font-black text-indigo-500">5</span></div>
                        <input type="range" id="intensity-slider" min="1" max="10" value="5" class="w-full">
                    </div>
                </div>
                <textarea id="note-field" rows="1" placeholder="Notes..." class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm outline-none"></textarea>
            </section>
        </main>
    </div>

    <nav class="fixed bottom-6 left-8 right-8 h-18 glass-card flex items-center justify-around px-6 z-50 shadow-2xl">
        <button onclick="showView('workout')" id="nav-workout" class="flex flex-col items-center gap-1 nav-active"><span class="text-xl">⚡</span><span class="text-[10px] font-black uppercase">训练</span></button>
        <button onclick="showView('calendar')" id="nav-calendar" class="flex flex-col items-center gap-1 text-slate-300"><span class="text-xl">📅</span><span class="text-[10px] font-black uppercase">记录</span></button>
    </nav>

    <script>
        let recoveryData = JSON.parse(localStorage.getItem('fitlog_rec_v94')) || {};
        let records = JSON.parse(localStorage.getItem('fitlog_logs_v94')) || [];
        let selectedParts = new Set();
        let selectedColor = '#1E1B4B';
        let timer, seconds = 0;

        function init() { 
            renderCalendar(); 
            updateHeatmap(); 
            renderHistory(); 
            updateStatusUI(); 
        }

        function selectColor(el) {
            document.querySelectorAll('#color-palette div').forEach(d => d.classList.remove('ring-indigo-400','ring-2','scale-110'));
            el.classList.add('ring-indigo-400','ring-2','scale-110');
            selectedColor = el.getAttribute('data-color');
        }

        function updateHeatmap() {
            document.querySelectorAll('.muscle-slice').forEach(slice => {
                const part = slice.getAttribute('data-part'); if (!part) return;
                const hrs = (Date.now() - (recoveryData[part] || 0)) / (1000 * 60 * 60);
                slice.classList.remove('heat-rested', 'heat-recovering', 'heat-fatigued');
                if (hrs < 24) slice.classList.add('heat-fatigued');
                else if (hrs < 48) slice.classList.add('heat-recovering');
                else slice.classList.add('heat-rested');
            });
        }

        // 🟢 恢复功能回归 + 动态按钮逻辑
        function updateStatusUI() {
            const statusBox = document.getElementById('recovery-status');
            const startBtn = document.getElementById('go-btn');
            statusBox.innerHTML = '';

            if (selectedParts.size > 0) {
                selectedParts.forEach(p => {
                    const tag = document.createElement('span');
                    if(['有氧','拉伸'].includes(p)) { tag.className = 'status-tag status-ready'; tag.innerText = p; }
                    else {
                        const hrs = (Date.now() - (recoveryData[p] || 0)) / (1000 * 60 * 60);
                        let cfg = hrs < 24 ? {l:'刚练完', c:'status-training'} : (hrs < 48 ? {l:'恢复中', c:'status-recovering'} : {l:'已就绪', c:'status-ready'});
                        tag.className = `status-tag ${cfg.c}`; tag.innerText = `${p}:${cfg.l}`;
                    }
                    statusBox.appendChild(tag);
                });

                if (!startBtn.innerText.includes('FINISH')) {
                    startBtn.innerText = `开始 ${Array.from(selectedParts).join('·')}`;
                    startBtn.classList.replace('bg-slate-400', 'bg-indigo-600');
                    startBtn.style.pointerEvents = 'auto';
                }
            } else {
                if (!startBtn.innerText.includes('FINISH')) {
                    startBtn.innerText = '请选择部位';
                    startBtn.classList.replace('bg-indigo-600', 'bg-slate-400');
                    startBtn.style.pointerEvents = 'none';
                }
            }
        }

        document.body.addEventListener('click', (e) => {
            const group = e.target.closest('[data-part]'); if (!group) return;
            const partName = group.getAttribute('data-part');
            const pieces = document.querySelectorAll(`[data-part="${partName}"]`);
            const isActive = pieces[0].classList.contains('is-active');
            pieces.forEach(p => p.classList.toggle('is-active', !isActive));
            isActive ? selectedParts.delete(partName) : selectedParts.add(partName);
            updateStatusUI();
        });

        function toggleSpecial(mode) {
            const btn = document.getElementById(mode === '有氧' ? 'btn-cardio' : 'btn-stretch');
            selectedParts.has(mode) ? selectedParts.delete(mode) : selectedParts.add(mode);
            btn.classList.toggle('active'); 
            updateStatusUI();
        }

        // 滑块交互
        document.getElementById('weight-slider').oninput = function() { document.getElementById('weight-val').innerText = `${this.value} kg`; };
        document.getElementById('intensity-slider').oninput = function() { document.getElementById('intensity-val').innerText = this.value; };

        // 训练计时逻辑
        const startBtn = document.getElementById('go-btn');
        startBtn.onclick = () => {
            if (startBtn.innerText.includes('FINISH')) {
                const now = new Date();
                const record = {
                    id: Date.now(),
                    dateKey: `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`,
                    time: now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0'),
                    duration: document.getElementById('timer-display').innerText,
                    parts: Array.from(selectedParts).join(' · '),
                    weight: document.getElementById('weight-val').innerText,
                    intensity: document.getElementById('intensity-val').innerText,
                    color: selectedColor,
                    note: document.getElementById('note-field').value
                };
                records.push(record);
                selectedParts.forEach(p => { if(!['有氧','拉伸'].includes(p)) recoveryData[p] = Date.now(); });
                localStorage.setItem('fitlog_logs_v94', JSON.stringify(records));
                localStorage.setItem('fitlog_rec_v94', JSON.stringify(recoveryData));
                clearInterval(timer); seconds = 0;
                document.getElementById('timer-display').innerText = '00:00:00';
                document.getElementById('note-field').value = '';
                location.reload(); // 重置状态
            } else {
                startBtn.innerText = '完成训练 FINISH';
                startBtn.classList.replace('bg-indigo-600', 'bg-rose-500');
                timer = setInterval(() => {
                    seconds++;
                    const h = Math.floor(seconds/3600).toString().padStart(2,'0');
                    const m = Math.floor((seconds%3600)/60).toString().padStart(2,'0');
                    const s = (seconds%60).toString().padStart(2,'0');
                    document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
                }, 1000);
            }
        };

        function showView(view) {
            document.getElementById('workout-view').classList.toggle('hidden', view === 'calendar');
            document.getElementById('calendar-view').classList.toggle('hidden', view === 'workout');
            document.getElementById('nav-workout').classList.toggle('nav-active', view === 'workout');
            document.getElementById('nav-calendar').classList.toggle('nav-active', view === 'calendar');
        }

        // 日历与历史逻辑 (保持稳定版内容)
        function renderCalendar() { /* ...此处保留你之前代码中的 renderCalendar 内容... */ }
        function renderHistory() { /* ...此处保留你之前代码中的 renderHistory 内容... */ }

        init();
    </script>
</body>
</html>
