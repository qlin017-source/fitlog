<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/flash-on.png?v=light">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FitLog⚡️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-main: #F1F5F9; --brand-main: #6366F1; --rested: #E2E8F0; --recovering: #FED7AA; --fatigued: #FECACA; --active: #FB7185; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        input, textarea { -webkit-user-select: auto; user-select: auto; }
        body { background-color: var(--bg-main); min-height: 100vh; font-family: "PingFang SC", sans-serif; color: #1E1B4B; padding-top: env(safe-area-inset-top); margin: 0; overflow-x: hidden; }
        .glass-card { background: #FFFFFF; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); border: 1px solid rgba(255, 255, 255, 1); }
        
        /* 统一补剂风标题 */
        .page-header { padding: 40px 0 20px; text-align: center; }
        .page-header h1 { 
            font-size: 2.5rem; font-weight: 900; font-style: italic; 
            letter-spacing: -2px; text-transform: uppercase; line-height: 1;
            color: #1E1B4B; position: relative; display: inline-block;
        }
        .page-header h1::after {
            content: ''; position: absolute; bottom: 4px; left: 0; width: 100%; 
            height: 12px; background: rgba(99, 102, 241, 0.15); z-index: -1;
        }
        .page-header span { color: #F43F5E; }

        /* 肌肉块与圆圈选中状态反馈 (优化白色可见度) */
        .muscle-slice { stroke: rgba(0,0,0,0.08); stroke-width: 0.8; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; transform-box: fill-box; transform-origin: center; }
        .no-click { cursor: default; pointer-events: none; opacity: 0.6; } 
        .heat-rested { fill: var(--rested); }
        .heat-recovering { fill: var(--recovering); }
        .heat-fatigued { fill: var(--fatigued); }
        
        .is-active, .is-active path, .is-active rect, .is-active circle { 
            fill: #FB7185 !important; 
            stroke: #E11D48 !important; 
            stroke-width: 1.5 !important;
            filter: drop-shadow(0 0 12px rgba(251, 113, 131, 0.6));
            transform: scale(1.08);
        }

        .status-tag { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 900; }
        .status-ready { background: #F1F5F9; color: #64748B; }
        .status-recovering { background: #FEF3C7; color: #92400E; }
        .status-training { background: #DBEAFE; color: #1E40AF; }
        
        .mode-btn { padding: 12px 24px; border-radius: 16px; font-weight: 900; font-size: 14px; border: 2px solid #F1F5F9; background: #FFF; color: #64748B; transition: all 0.3s; }
        .mode-btn.active { background: var(--brand-main); color: white; border-color: var(--brand-main); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        
        .color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; transition: all 0.2s; border: 2px solid #E2E8F0; position: relative; }
        .color-dot.selected { 
            transform: scale(1.3); 
            border-color: var(--brand-main) !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3); 
            z-index: 10; 
        }

        /* 历史记录卡片与极简图标 */
        .record-card { border-left: 8px solid transparent; position: relative; border-radius: 24px; overflow: hidden; }
        .record-actions { position: absolute; top: 18px; right: 16px; display: flex; gap: 12px; }
        .action-icon { font-size: 14px; color: #CBD5E1; cursor: pointer; transition: color 0.2s; }
        .action-icon:hover { color: #64748B; }
        
        .streak-badge { background: #1E1B4B; color: white; padding: 12px 24px; border-radius: 20px; font-weight: 900; letter-spacing: -0.5px; }

        .nav-active { color: var(--brand-main) !important; font-weight: 900; }
    </style>
</head>
<body>
    <div id="workout-view" class="flex flex-col min-h-screen px-6 pb-32">
        <header class="page-header"><h1>FitLog<span>.</span></h1></header>
        <main class="flex-1 flex flex-col justify-center max-w-md mx-auto w-full space-y-6">
            <section class="glass-card p-6 flex flex-col items-center">
                <div class="flex justify-around items-start w-full mt-2 mb-2">
                    <div class="flex-1 flex flex-col items-center">
                        <span class="text-[10px] font-black text-slate-300 mb-4 uppercase">Front View</span>
                        <svg viewBox="0 0 100 160" class="w-32 h-auto overflow-visible">
                            <circle cx="50" cy="15" r="9" class="muscle-slice heat-rested no-click" /> 
                            <circle data-part="肩膀" cx="31" cy="29" r="7" class="muscle-slice heat-rested" />
                            <circle data-part="肩膀" cx="69" cy="29" r="7" class="muscle-slice heat-rested" />
                            <path data-part="胸部" d="M36 32 a14 14 0 0 1 28 0 v4 h-28 z" class="muscle-slice heat-rested" />
                            <g data-part="核心">
                                <rect x="41" y="44" width="8" height="7" rx="2" class="muscle-slice heat-rested" /><rect x="51" y="44" width="8" height="7" rx="2" class="muscle-slice heat-rested" />
                                <rect x="41" y="53" width="8" height="7" rx="2" class="muscle-slice heat-rested" /><rect x="51" y="53" width="8" height="7" rx="2" class="muscle-slice heat-rested" />
                                <rect x="41" y="62" width="8" height="7" rx="2" class="muscle-slice heat-rested" /><rect x="51" y="62" width="8" height="7" rx="2" class="muscle-slice heat-rested" />
                            </g>
                            <rect data-part="大臂" x="18" y="37" width="9" height="18" rx="4.5" class="muscle-slice heat-rested" /><rect data-part="大臂" x="73" y="37" width="9" height="18" rx="4.5" class="muscle-slice heat-rested" />
                            <rect data-part="小臂" x="15" y="58" width="8" height="16" rx="4" class="muscle-slice heat-rested" /><rect data-part="小臂" x="77" y="58" width="8" height="16" rx="4" class="muscle-slice heat-rested" />
                            <rect data-part="大腿" x="38" y="76" width="11" height="26" rx="5.5" class="muscle-slice heat-rested" /><rect data-part="大腿" x="51" y="76" width="11" height="26" rx="5.5" class="muscle-slice heat-rested" />
                            <rect data-part="小腿" x="39" y="105" width="9" height="22" rx="4.5" class="muscle-slice heat-rested" /><rect data-part="小腿" x="52" y="105" width="9" height="22" rx="4.5" class="muscle-slice heat-rested" />
                        </svg>
                    </div>
                    <div class="flex-1 flex flex-col items-center">
                        <span class="text-[10px] font-black text-slate-300 mb-4 uppercase">Back View</span>
                        <svg viewBox="0 0 100 160" class="w-32 h-auto overflow-visible">
                            <circle cx="50" cy="15" r="9" class="muscle-slice heat-rested no-click" />
                            <path data-part="背部" d="M28 28 q22 -6 44 0 l-4 16 h-36 z" class="muscle-slice heat-rested" />
                            <g data-part="臀部">
                                <circle cx="43" cy="64" r="11" class="muscle-slice heat-rested" /><circle cx="57" cy="64" r="11" class="muscle-slice heat-rested" />
                            </g>
                            <rect data-part="大腿" x="40" y="78" width="10" height="25" rx="5" class="muscle-slice heat-rested" /><rect data-part="大腿" x="50" y="78" width="10" height="25" rx="5" class="muscle-slice heat-rested" />
                            <rect data-part="小腿" x="41" y="105" width="8" height="22" rx="4" class="muscle-slice heat-rested" /><rect data-part="小腿" x="51" y="105" width="8" height="22" rx="4" class="muscle-slice heat-rested" />
                        </svg>
                    </div>
                </div>
                <div id="recovery-status" class="flex flex-wrap justify-center gap-1 min-h-[22px] mb-4"></div>
                <div class="flex gap-3 w-full mt-2">
                    <button id="btn-cardio" onclick="toggleSpecial('有氧')" class="mode-btn flex-1 py-3">🏃 有氧</button>
                    <button id="btn-stretch" onclick="toggleSpecial('拉伸')" class="mode-btn flex-1 py-3">🧘 拉伸</button>
                </div>
                <button id="go-btn" class="w-full mt-4 bg-slate-400 text-white py-5 px-6 rounded-3xl font-black text-lg shadow-xl active:scale-95 transition-all">请选择部位</button>
            </section>
        </main>
    </div>

    <div id="supps-view" class="px-6 pb-40 hidden">
        <header class="page-header"><h1>Supplement<span>.</span></h1></header>
        <main class="max-w-md mx-auto space-y-4" id="supp-list"></main>
        <div class="fixed bottom-32 left-8 right-8"><button id="supp-save-btn" onclick="saveSuppsBatch()" class="w-full bg-slate-400 text-white py-5 rounded-3xl font-black text-lg shadow-xl active:scale-95 transition-all">请选择补剂</button></div>
    </div>

    <div id="calendar-view" class="px-6 pb-32 hidden">
        <header class="page-header"><h1>History<span>.</span></h1></header>
        <div class="max-w-md mx-auto space-y-6">
            <div class="flex justify-center mb-2"><div class="streak-badge flex items-center gap-2"><span>STREAK: </span><span id="streak-count" class="text-2xl">0</span><span> DAYS</span></div></div>
            <div class="glass-card p-6"><p class="text-center font-black mb-4 text-xs text-slate-400" id="calendar-title"></p><div class="calendar-grid grid grid-cols-7 gap-1" id="calendar-days"></div></div>
            <div id="history-list" class="space-y-4"></div>
        </div>
    </div>

    <nav class="fixed bottom-8 left-8 right-8 h-20 glass-card flex items-center justify-around px-6 z-50">
        <button onclick="showView('workout')" id="nav-workout" class="flex flex-col items-center gap-1 nav-active"><span class="text-xl">⚡</span><span class="text-[10px] font-black uppercase">WORKOUT</span></button>
        <button onclick="showView('supps')" id="nav-supps" class="flex flex-col items-center gap-1 text-slate-300"><span class="text-xl">💊</span><span class="text-[10px] font-black uppercase">SUPPS</span></button>
        <button onclick="showView('calendar')" id="nav-calendar" class="flex flex-col items-center gap-1 text-slate-300"><span class="text-xl">📅</span><span class="text-[10px] font-black uppercase">LOGS</span></button>
    </nav>

    <script>
        let records = JSON.parse(localStorage.getItem('fitlog_logs_v94')) || [];
        let recoveryData = JSON.parse(localStorage.getItem('fitlog_rec_v94')) || {};
        let selectedParts = new Set(), selectedSupps = new Set(), timer, seconds = 0;

        const suppConfigs = [
            { id: 'pro', name: '蛋白粉', icon: '🍗', unit: '克', max: 60, def: 30 },
            { id: 'cre', name: '肌酸', icon: '⚡', unit: '克', max: 10, def: 5 },
            { id: 'pre', name: '氮泵', icon: '🔥', unit: '勺', max: 2, def: 1 }
        ];

        function init() { renderCalendar(); renderSupps(); updateStatusUI(); }

        function showView(view) {
            document.querySelectorAll('[id$="-view"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`${view}-view`).classList.remove('hidden');
            ['workout', 'supps', 'calendar'].forEach(item => {
                const btn = document.getElementById(`nav-${item}`);
                btn.className = item === view ? 'flex flex-col items-center gap-1 nav-active' : 'flex flex-col items-center gap-1 text-slate-300';
            });
            if (view === 'calendar') { renderHistory(); renderCalendar(); updateStreak(); }
        }

        // 历史渲染逻辑（含编辑图标）
        function renderHistory() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            [...records].reverse().forEach(r => {
                const card = document.createElement('div');
                card.className = 'record-card glass-card p-6 mb-3';
                card.style.borderLeftColor = r.color || '#6366F1';
                card.innerHTML = `
                    <div class="record-actions">
                        <span class="action-icon" onclick="editRecord(${r.id})">✎</span>
                        <span class="action-icon" onclick="deleteRecord(${r.id})">✕</span>
                    </div>
                    <div class="mb-1 text-[10px] font-black text-indigo-400 uppercase tracking-widest">${r.dateKey} ${r.time}</div>
                    <p class="text-lg font-black text-indigo-950">${r.parts}</p>
                    <div class="flex gap-4 mt-2">
                        <span class="text-[10px] font-bold text-slate-500 uppercase">Weight: ${r.weight}</span>
                        <span class="text-[10px] font-bold text-slate-500 uppercase">Dur: ${r.duration}</span>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function deleteRecord(id) {
            if(confirm('确认删除？')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('fitlog_logs_v94', JSON.stringify(records));
                renderHistory();
            }
        }

        function editRecord(id) {
            const record = records.find(r => r.id === id);
            const newNote = prompt("更新备注:", record.note || "");
            if (newNote !== null) {
                record.note = newNote;
                localStorage.setItem('fitlog_logs_v94', JSON.stringify(records));
                renderHistory();
            }
        }

        function updateStreak() {
            const dates = [...new Set(records.map(r => r.dateKey))];
            document.getElementById('streak-count').innerText = dates.length;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-days'); grid.innerHTML = '';
            const now = new Date();
            document.getElementById('calendar-title').innerText = `${now.getFullYear()} / ${now.getMonth() + 1}`;
            for(let i=1; i<=30; i++) {
                const day = document.createElement('div');
                day.className = `aspect-square flex flex-col items-center justify-center rounded-xl text-[10px] font-black ${i === now.getDate() ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-400'}`;
                day.innerText = i;
                grid.appendChild(day);
            }
        }

        function renderSupps() {
            const container = document.getElementById('supp-list');
            container.innerHTML = suppConfigs.map(s => `
                <div class="glass-card p-5 supp-card flex justify-between items-center" id="supp-card-${s.id}" onclick="toggleSupp('${s.id}')">
                    <div class="flex items-center gap-4">
                        <span class="text-2xl">${s.icon}</span>
                        <span class="font-black text-indigo-950 uppercase tracking-tighter">${s.name}</span>
                    </div>
                    <span class="font-black text-indigo-600">${s.def}${s.unit}</span>
                </div>
            `).join('');
        }

        function toggleSupp(id) {
            const el = document.getElementById(`supp-card-${id}`);
            if(selectedSupps.has(id)) { selectedSupps.delete(id); el.style.borderColor = 'transparent'; }
            else { selectedSupps.add(id); el.style.borderColor = '#6366F1'; el.style.borderWidth = '2px'; }
            const btn = document.getElementById('supp-save-btn');
            btn.innerText = selectedSupps.size ? `CONFIRM (${selectedSupps.size})` : 'SELECT SUPPS';
            btn.className = `w-full py-5 rounded-3xl font-black text-lg transition-all ${selectedSupps.size ? 'bg-indigo-600 text-white' : 'bg-slate-400 text-white'}`;
        }

        function saveSuppsBatch() {
            if(!selectedSupps.size) return;
            const now = new Date();
            records.push({
                id: Date.now(),
                dateKey: `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`,
                time: now.getHours() + ":" + now.getMinutes(),
                parts: "SUPPLEMENT STACK",
                weight: Array.from(selectedSupps).join(','),
                duration: "INSTANT",
                color: "#6366F1"
            });
            localStorage.setItem('fitlog_logs_v94', JSON.stringify(records));
            selectedSupps.clear();
            showView('calendar');
        }

        // 基础交互
        document.body.addEventListener('click', (e) => {
            const group = e.target.closest('[data-part]');
            if (!group) return;
            const partName = group.getAttribute('data-part');
            const isActive = group.classList.contains('is-active');
            document.querySelectorAll(`[data-part="${partName}"]`).forEach(p => p.classList.toggle('is-active'));
            isActive ? selectedParts.delete(partName) : selectedParts.add(partName);
            updateStatusUI();
        });

        function updateStatusUI() {
            const btn = document.getElementById('go-btn');
            if(selectedParts.size > 0) {
                btn.innerText = `GO: ${Array.from(selectedParts).slice(0,2).join(' ')}...`;
                btn.classList.replace('bg-slate-400', 'bg-indigo-600');
            } else {
                btn.innerText = '请选择部位';
                btn.classList.replace('bg-indigo-600', 'bg-slate-400');
            }
        }

        function toggleSpecial(m) { 
            const btn = document.getElementById(m === '有氧' ? 'btn-cardio' : 'btn-stretch');
            btn.classList.toggle('active');
            selectedParts.has(m) ? selectedParts.delete(m) : selectedParts.add(m);
            updateStatusUI();
        }

        init();
    </script>
</body>
</html>
