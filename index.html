<div id="quick-repeat-container" class="w-full mt-4 hidden">
    <button onclick="applyLastWorkout()" class="w-full bg-white border-2 border-slate-100 py-3 px-4 rounded-2xl flex items-center justify-between active:scale-95 transition-all">
        <div class="flex items-center gap-3">
            <div id="last-color-dot" class="w-3 h-3 rounded-full shadow-sm"></div>
            <span class="text-xs font-black text-slate-500 uppercase tracking-wider">复刻上次训练</span>
        </div>
        <span id="last-workout-info" class="text-xs font-bold text-indigo-950"></span>
    </button>
</div>
<button id="go-btn" class="w-full mt-2 bg-slate-400 text-white py-5 px-6 rounded-3xl font-black text-lg shadow-xl active:scale-95 transition-all">请选择部位</button>

<script>
    // ... 在 init() 函数中加入更新复刻按钮的调用
    function init() { 
        renderCalendar(); 
        updateHeatmap(); 
        renderSupps();
        updateStatusUI();
        calculateStreak();
        updateQuickRepeatUI(); // 初始化复刻入口
    }

    // 逻辑：更新复刻按钮的显示
    function updateQuickRepeatUI() {
        const lastWorkout = [...records].reverse().find(r => r.type === 'workout');
        const container = document.getElementById('quick-repeat-container');
        if (lastWorkout) {
            container.classList.remove('hidden');
            document.getElementById('last-color-dot').style.backgroundColor = lastWorkout.color;
            document.getElementById('last-workout-info').innerText = `${lastWorkout.parts} (${lastWorkout.weight})`;
        }
    }

    // 逻辑：点击复刻按钮后的执行动作
    function applyLastWorkout() {
        const lastWorkout = [...records].reverse().find(r => r.type === 'workout');
        if (!lastWorkout) return;

        // 1. 清除当前选择
        selectedParts.clear();
        document.querySelectorAll('.muscle-slice').forEach(p => p.classList.remove('is-active'));
        document.getElementById('btn-cardio').classList.remove('active');
        document.getElementById('btn-stretch').classList.remove('active');

        // 2. 恢复部位选择
        const parts = lastWorkout.parts.split(' · ');
        parts.forEach(p => {
            selectedParts.add(p);
            if (p === '有氧') document.getElementById('btn-cardio').classList.add('active');
            else if (p === '拉伸') document.getElementById('btn-stretch').classList.add('active');
            else {
                document.querySelectorAll(`[data-part="${p}"]`).forEach(el => el.classList.add('is-active'));
            }
        });

        // 3. 恢复重量和颜色
        const weightValue = parseInt(lastWorkout.weight);
        document.getElementById('weight-slider').value = weightValue;
        document.getElementById('weight-val').innerText = lastWorkout.weight;
        
        // 模拟点击颜色选择器
        const colorDiv = document.querySelector(`[data-color="${lastWorkout.color}"]`);
        if (colorDiv) selectColor(colorDiv);

        // 4. 更新UI状态
        updateStatusUI();
        
        // 轻微震动反馈
        if (window.navigator.vibrate) window.navigator.vibrate(20);
    }

    // ... 其余原有函数保持不变 ...
</script>
