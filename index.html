<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/flash-on.png?v=light">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FitLog Pro - Kinsley 专属版⚡️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-main: #F1F5F9; --brand-main: #6366F1; --rested: #E2E8F0; --active: #FB7185; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: var(--bg-main); min-height: 100vh; font-family: "PingFang SC", sans-serif; color: #1E1B4B; margin: 0; }
        
        .glass-card { background: #FFFFFF; border-radius: 32px; box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08); border: 1px solid #FFF; }
        .muscle-slice { stroke: #FFF; stroke-width: 1.2; transition: all 0.3s; cursor: pointer; fill: var(--rested); }
        .is-active { fill: var(--active) !important; filter: drop-shadow(0 0 8px rgba(251, 113, 131, 0.4)); }
        
        .mode-btn { padding: 12px 20px; border-radius: 16px; font-weight: 900; font-size: 14px; background: #FFF; color: #64748B; border: 2px solid #F1F5F9; transition: 0.3s; }
        .mode-btn.active { background: var(--brand-main); color: white; border-color: var(--brand-main); }
        
        input[type=range] { -webkit-appearance: none; background: #E2E8F0; height: 6px; border-radius: 3px; width: 100%; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; background: var(--brand-main); border: 3px solid #FFF; }
        
        .nav-active { color: var(--brand-main) !important; font-weight: 900; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-cell { aspect-ratio: 1; border-radius: 12px; background: #FFF; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
        .day-today { background: var(--brand-main) !important; color: white !important; }
        .workout-dot { width: 4px; height: 4px; border-radius: 50%; margin: 1px; }

        .supp-card { transition: 0.3s; border: 2px solid transparent; cursor: pointer; }
        .supp-card.selected { border-color: var(--brand-main); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="workout-view" class="px-6 pb-32">
        <header class="pt-8 pb-4 text-center"><h1 class="text-3xl font-black italic text-indigo-950">FITLOG<span class="text-rose-500">.</span></h1></header>
        <main class="max-w-md mx-auto space-y-6">
            <section class="glass-card p-6 flex flex-col items-center">
                <div class="flex justify-around w-full mb-4">
                    <svg viewBox="0 0 100 160" class="w-32 h-auto">
                        <circle data-part="肩膀" cx="31" cy="29" r="7" class="muscle-slice" />
                        <circle data-part="肩膀" cx="69" cy="29" r="7" class="muscle-slice" />
                        <path data-part="胸部" d="M35 32 q15-5 30 0 v6 h-30 z" class="muscle-slice" />
                        <rect data-part="核心" x="42" y="44" width="16" height="22" rx="2" class="muscle-slice" />
                        <rect data-part="大腿" x="37" y="76" width="12" height="28" rx="6" class="muscle-slice" />
                        <rect data-part="大腿" x="51" y="76" width="12" height="28" rx="6" class="muscle-slice" />
                    </svg>
                </div>
                <div class="flex gap-3 w-full">
                    <button id="btn-cardio" onclick="toggleSpecial('有氧')" class="mode-btn flex-1">🏃 有氧</button>
                    <button id="btn-stretch" onclick="toggleSpecial('拉伸')" class="mode-btn flex-1">🧘 拉伸</button>
                </div>
                <button id="go-btn" class="w-full mt-4 bg-slate-400 text-white py-5 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all">请选择部位</button>
            </section>
            <section class="glass-card p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-2xl font-black tabular-nums" id="timer-display">00:00:00</h3>
                    <div id="color-palette" class="flex gap-2">
                        <div class="w-6 h-6 rounded-full bg-indigo-950 ring-2 ring-indigo-400 cursor-pointer" data-color="#1E1B4B" onclick="selectColor(this)"></div>
                        <div class="w-6 h-6 rounded-full bg-rose-500 cursor-pointer" data-color="#FB7185" onclick="selectColor(this)"></div>
                    </div>
                </div>
                <div class="flex justify-between text-xs font-black"><span>重量 Weight</span><span id="weight-label">2kg</span></div>
                <input type="range" id="weight-slider" min="0" max="120" value="0" oninput="document.getElementById('weight-label').innerText=this.value+'kg'">
                <textarea id="note-field" rows="1" placeholder="今天状态如何？" class="w-full p-3 bg-slate-50 rounded-xl text-sm outline-none"></textarea>
            </section>
        </main>
    </div>

    <div id="supps-view" class="px-6 pt-12 pb-48 hidden">
        <header class="text-center mb-8"><h2 class="text-xl font-black italic">SUPPLEMENTS</h2></header>
        <main class="max-w-md mx-auto space-y-3" id="supp-batch-container"></main>
        <div class="fixed bottom-32 left-8 right-8 z-40">
            <button onclick="submitBatchSupps()" id="batch-submit-btn" class="w-full bg-slate-200 text-slate-400 py-5 rounded-3xl font-black transition-all">选择补剂 (0)</button>
        </div>
    </div>

    <div id="calendar-view" class="px-6 pt-12 pb-32 hidden">
        <header class="text-center mb-6"><h2 class="text-xl font-black italic">HISTORY</h2></header>
        <div class="max-w-md mx-auto space-y-6">
            <div class="glass-card p-6"><div class="calendar-grid" id="calendar-days"></div></div>
            <div id="history-list" class="space-y-4"></div>
        </div>
    </div>

    <nav class="fixed bottom-8 left-8 right-8 h-20 glass-card flex items-center justify-around z-50">
        <button onclick="showView('workout')" id="nav-workout" class="flex flex-col items-center gap-1 nav-active"><span class="text-xl">⚡</span><span class="text-[10px] font-black">训练</span></button>
        <button onclick="showView('supps')" id="nav-supps" class="flex flex-col items-center gap-1 text-slate-300"><span class="text-xl">💊</span><span class="text-[10px] font-black">补剂</span></button>
        <button onclick="showView('calendar')" id="nav-calendar" class="flex flex-col items-center gap-1 text-slate-300"><span class="text-xl">📅</span><span class="text-[10px] font-black">记录</span></button>
    </nav>

    <script>
        let logs = JSON.parse(localStorage.getItem('fitlog_v97')) || [];
        let selectedParts = new Set(), selectedSupps = new Set(), selectedColor = '#1E1B4B', timer, seconds = 0;

        const suppConfigs = [
            { id: 'protein', name: '蛋白粉', unit: 'g', max: 60, default: 30, icon: '🍗' },
            { id: 'creatine', name: '肌酸', unit: 'g', max: 10, default: 5, icon: '⚡' },
            { id: 'pre', name: '氮泵', unit: '勺', max: 2, default: 1, icon: '🔥' },
            { id: 'omega3', name: '鱼油', unit: '粒', max: 5, default: 2, icon: '🐟' }
        ];

        function init() { renderCalendar(); renderHistory(); renderSuppCards(); }

        function showView(view) {
            ['workout', 'supps', 'calendar'].forEach(v => {
                document.getElementById(`${v}-view`).classList.add('hidden');
                document.getElementById(`nav-${v}`).classList.replace('nav-active', 'text-slate-300');
            });
            document.getElementById(`${view}-view`).classList.remove('hidden');
            document.getElementById(`nav-${view}`).classList.replace('text-slate-300', 'nav-active');
            if(view === 'calendar') renderHistory();
        }

        // --- 训练逻辑 ---
        document.querySelectorAll('.muscle-slice').forEach(el => {
            el.onclick = () => {
                const p = el.getAttribute('data-part');
                selectedParts.has(p) ? selectedParts.delete(p) : selectedParts.add(p);
                el.classList.toggle('is-active');
                const btn = document.getElementById('go-btn');
                if(selectedParts.size > 0) {
                    btn.innerText = `开始训练 ${Array.from(selectedParts).join('·')}`;
                    btn.classList.replace('bg-slate-400', 'bg-indigo-600');
                    btn.style.pointerEvents = 'auto';
                } else {
                    btn.innerText = '请选择部位';
                    btn.classList.replace('bg-indigo-600', 'bg-slate-400');
                }
            };
        });

        document.getElementById('go-btn').onclick = function() {
            if (this.innerText.includes('完成')) {
                const now = new Date();
                logs.push({ 
                    id: Date.now(), day: now.getDate(), 
                    time: now.getHours()+":"+now.getMinutes().toString().padStart(2,'0'),
                    parts: Array.from(selectedParts).join(' · '), 
                    weight: document.getElementById('weight-label').innerText, 
                    duration: document.getElementById('timer-display').innerText,
                    color: selectedColor, type: 'workout' 
                });
                saveAndFinish();
            } else {
                this.innerText = '完成训练 FINISH'; this.classList.replace('bg-indigo-600', 'bg-rose-500');
                timer = setInterval(() => { seconds++; updateTimer(); }, 1000);
            }
        };

        // --- 补剂逻辑 ---
        function renderSuppCards() {
            const container = document.getElementById('supp-batch-container');
            container.innerHTML = suppConfigs.map(conf => `
                <div class="glass-card p-5 supp-card" id="supp-${conf.id}" onclick="toggleSuppSelection('${conf.id}')">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3"><span>${conf.icon}</span><h3 class="font-black">${conf.name}</h3></div>
                        <span id="label-${conf.id}" class="font-black text-indigo-500">${conf.default}${conf.unit}</span>
                    </div>
                    <div class="mt-4 hidden" id="ctrl-${conf.id}" onclick="event.stopPropagation()">
                        <input type="range" min="0" max="${conf.max}" value="${conf.default}" oninput="document.getElementById('label-${conf.id}').innerText=this.value+'${conf.unit}'">
                    </div>
                </div>
            `).join('');
        }

        function toggleSuppSelection(id) {
            const card = document.getElementById(`supp-${id}`);
            const ctrl = document.getElementById(`ctrl-${id}`);
            selectedSupps.has(id) ? selectedSupps.delete(id) : selectedSupps.add(id);
            card.classList.toggle('selected'); ctrl.classList.toggle('hidden');
            const btn = document.getElementById('batch-submit-btn');
            btn.innerText = selectedSupps.size ? `确认记录 ${selectedSupps.size} 项补剂` : '选择补剂 (0)';
            btn.className = selectedSupps.size ? "w-full bg-indigo-600 text-white py-5 rounded-3xl font-black shadow-lg" : "w-full bg-slate-200 text-slate-400 py-5 rounded-3xl font-black";
        }

        function submitBatchSupps() {
            const now = new Date();
            selectedSupps.forEach(id => {
                const conf = suppConfigs.find(c => c.id === id);
                logs.push({ 
                    id: Date.now()+Math.random(), day: now.getDate(), 
                    time: now.getHours()+":"+now.getMinutes().toString().padStart(2,'0'),
                    parts: `💊 ${conf.name}`, weight: document.getElementById(`label-${id}`).innerText, 
                    duration: '补剂补充', color: '#6366F1', type: 'supp' 
                });
            });
            saveAndFinish();
        }

        function saveAndFinish() {
            localStorage.setItem('fitlog_v97', JSON.stringify(logs));
            fireConfetti();
            setTimeout(() => { 
                selectedParts.clear(); selectedSupps.clear();
                seconds = 0; clearInterval(timer);
                document.getElementById('timer-display').innerText = "00:00:00";
                document.querySelectorAll('.is-active').forEach(p => p.classList.remove('is-active'));
                renderSuppCards();
                showView('calendar');
            }, 800);
        }

        function fireConfetti() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#6366F1', '#FB7185', '#10B981'] });
        }

        function updateTimer() {
            const m=Math.floor(seconds/60).toString().padStart(2,'0'), s=(seconds%60).toString().padStart(2,'0');
            document.getElementById('timer-display').innerText = `00:${m}:${s}`;
        }

        function selectColor(el) {
            document.querySelectorAll('#color-palette div').forEach(d => d.classList.remove('ring-2','ring-indigo-400'));
            el.classList.add('ring-2','ring-indigo-400'); selectedColor = el.getAttribute('data-color');
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = logs.map(r => `
                <div class="glass-card p-5 border-l-4" style="border-color:${r.color}">
                    <div class="flex justify-between mb-1"><span class="text-[10px] font-black text-slate-400">${r.time}</span><span class="font-black text-indigo-900">${r.duration}</span></div>
                    <p class="font-black text-indigo-950 text-sm">${r.parts}</p>
                    <p class="text-[10px] font-bold text-slate-500">${r.weight}</p>
                </div>
            `).reverse().join('');
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-days'); grid.innerHTML = '';
            const today = new Date().getDate();
            for(let i=1; i<=31; i++) {
                const dayLogs = logs.filter(r => r.day === i);
                let dots = dayLogs.map(l => `<div class="workout-dot" style="background:${l.color}"></div>`).join('');
                grid.innerHTML += `<div class="day-cell ${i===today?'day-today':''}">${i}<div class="flex flex-wrap justify-center">${dots}</div></div>`;
            }
        }
        init();
    </script>
</body>
</html>
